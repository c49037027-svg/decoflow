<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="DecoFlow" />
<meta name="theme-color" content="#1a1a1a" />
<title>DecoFlow 互動體驗</title>

<!-- PWA：可加到 iPad/iPhone/Android 主畫面，像 App 一樣全螢幕 -->
<link rel="manifest" href="manifest.json" />
<link rel="icon" type="image/svg+xml" href="icon.svg" />
<link rel="apple-touch-icon" href="icon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  /* === 獨立互動體驗頁面：鎖死視窗、不可滾動（iPad Air 最佳化）=== */
  html, body {
    height: 100%;
    height: 100dvh;
    overflow: hidden;                   /* 整頁鎖住，不上下滾 */
  }
  body {
    margin: 0;
    background: var(--bg-soft);
    overscroll-behavior: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: fixed;                    /* iOS Safari 防止橡皮筋滾動 */
    inset: 0;
  }
  .demo-page {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
  }

  /* 頂部標題列（更精簡）*/
  .demo-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 12px;
    background: var(--ink);
    color: #fff;
    flex-shrink: 0;
  }
  .demo-bar .logo {
    display: flex;
    align-items: center;
    gap: 7px;
    font-weight: 900;
    font-size: 14px;
    color: #fff;
    text-decoration: none;
    letter-spacing: -0.01em;
  }
  .demo-bar .logo-mark {
    width: 22px;
    height: 22px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: #fff;
    border-radius: 6px;
    font-size: 13px;
  }
  .demo-bar .logo-mark svg { width: 70%; height: 70%; display: block; }
  .demo-bar a.back {
    color: var(--accent);
    text-decoration: none;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border: 1px solid rgba(201, 168, 124, 0.4);
    border-radius: 50px;
    transition: all .2s;
  }
  .demo-bar a.back:active,
  .demo-bar a.back:hover { background: rgba(201, 168, 124, 0.15); }

  /* 內容：填滿剩餘視窗高度 */
  .demo-page-body {
    flex: 1;
    min-height: 0;                      /* 允許 flex 子元素正常縮小 */
    padding: 8px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .demo-page-body .demo-wrap {
    flex: 1;
    min-height: 0;
    gap: 8px;
    align-items: stretch;
    height: 100%;
  }
  .demo-page-body .demo-stage {
    height: 100%;
    min-height: 0;
    flex: 1;
  }
  .demo-page-body .demo-panel {
    padding: 10px 10px;
    gap: 8px;
    overflow-y: auto;
    max-height: 100%;
    -webkit-overflow-scrolling: touch;
  }

  /* 面板內元素再瘦一輪 */
  .demo-page-body .demo-panel .panel-section { margin-bottom: 0; }
  .demo-page-body .demo-panel .panel-section h4 {
    font-size: 11px;
    margin-bottom: 5px;
    letter-spacing: 0.02em;
  }
  .demo-page-body .demo-panel .panel-icon { font-size: 12px; margin-right: 4px; }
  .demo-page-body .demo-panel .style-buttons,
  .demo-page-body .demo-panel .layout-buttons { gap: 5px; }
  .demo-page-body .demo-panel .style-btn,
  .demo-page-body .demo-panel .layout-btn { padding: 6px 4px; font-size: 11px; }
  .demo-page-body .demo-panel .color-row { gap: 5px; }
  .demo-page-body .demo-panel .color-swatch { width: 24px; height: 24px; border-radius: 6px; }
  .demo-page-body .demo-panel .color-picker { width: 32px; height: 24px; }
  .demo-page-body .demo-panel .furniture-toggles { gap: 4px; }
  .demo-page-body .demo-panel .furniture-toggles label { padding: 5px 6px; font-size: 11px; }
  .demo-page-body .demo-panel .voice-btn,
  .demo-page-body .demo-panel .generate-btn,
  .demo-page-body .demo-panel .reset-btn { padding: 8px 10px; font-size: 12px; }
  .demo-page-body .demo-panel .voice-status { font-size: 10px; margin-top: 5px; }
  .demo-page-body .demo-panel .action-row { gap: 6px; }

  /* 舞台覆蓋元素縮小 */
  .demo-page-body .demo-style-tag { top: 10px; left: 10px; padding: 5px 11px; font-size: 11px; }
  .demo-page-body .cart-chip { top: 10px; right: 10px; padding: 5px 11px; font-size: 11px; }
  .demo-page-body .demo-hint { bottom: 10px; padding: 5px 12px; font-size: 10px; }

  /* iPad / touch：禁止瀏覽器接管 canvas 的觸控（讓 OrbitControls 完整接手）*/
  #demoCanvas {
    touch-action: none;
    display: block;
    width: 100%;
    height: 100%;
  }

  /* iPad Air 直向（820 寬）仍維持左右並排，避免堆疊造成滾動 */
  /* 只有真正窄到 < 680px（手機）才堆疊 */
  @media (max-width: 680px) {
    .demo-page-body .demo-wrap {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
    }
    .demo-page-body .demo-stage { min-height: 0; }
    .demo-page-body .demo-panel { max-height: 42vh; }
  }
  /* iPad 直向專屬調整：panel 略窄 */
  @media (min-width: 681px) and (max-width: 900px) {
    .demo-page-body .demo-wrap { grid-template-columns: 1.8fr 1fr; }
  }
</style>
</head>
<body>
<div class="demo-page">

  <!-- 頂部標題列 -->
  <div class="demo-bar">
    <a class="logo" href="index.html">
      <span class="logo-mark"><svg viewBox="0 0 100 100" aria-hidden="true"><line x1="33" y1="16" x2="33" y2="84" stroke="currentColor" stroke-width="7" stroke-linecap="round"/><circle cx="55" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="7"/></svg></span>
      <span>DecoFlow 互動體驗</span>
    </a>
    <a class="back" href="index.html">← 回首頁</a>
  </div>

  <!-- 互動體驗內容 -->
  <div class="demo-page-body">
    <div class="demo-wrap">
      <div class="demo-stage">
        <canvas id="demoCanvas"></canvas>
        <div class="demo-loader" id="demoLoader">
          <div class="spinner"></div>
          <p>載入 3D 場景中...</p>
        </div>
        <div class="demo-hint">✋ 拖曳移動　🔄 雙擊旋轉　🛒 單擊家具看商品</div>
        <div class="demo-style-tag" id="demoStyleTag">北歐風</div>

        <!-- 購物車摘要（可點擊展開）-->
        <div class="cart-chip" id="cartChip" title="點擊展開購物車">
          <span class="cart-ico">🛒</span>
          <span id="cartCount">0</span> 件
          <span class="cart-total" id="cartTotal">NT$0</span>
        </div>

        <!-- 購物車清單 -->
        <div class="cart-list" id="cartList">
          <div class="cart-list-head">
            <span>🛒 購物車</span>
            <button class="cart-list-close" id="cartListClose">×</button>
          </div>
          <div class="cart-items" id="cartItems"></div>
          <div class="cart-list-foot">
            <span>合計</span>
            <span id="cartListTotal">NT$0</span>
          </div>
          <button class="cart-checkout" id="cartCheckout">前往結帳</button>
        </div>

        <!-- 商品卡（點擊家具時跳出）-->
        <div class="product-card" id="productCard">
          <button class="product-close" id="productClose">×</button>
          <div class="product-brand" id="productBrand">IKEA</div>
          <div class="product-name" id="productName">北歐風 布質三人沙發</div>
          <div class="product-price" id="productPrice">NT$18,900</div>
          <div class="product-models-wrap" id="productModelsWrap">
            <div class="product-models-label">其他款式</div>
            <div class="product-models" id="productModels"></div>
          </div>
          <div class="product-actions">
            <button class="product-buy" id="productBuy">🛒 加入購物車</button>
          </div>
          <div class="product-note">透過 DecoFlow 導購，平台收取分潤</div>
        </div>
      </div>

      <div class="demo-panel">
        <div class="panel-section">
          <h4><span class="panel-icon">🎨</span>一鍵風格切換</h4>
          <div class="style-buttons">
            <button class="style-btn active" data-style="nordic">北歐風</button>
            <button class="style-btn" data-style="japanese">日式無印</button>
            <button class="style-btn" data-style="industrial">工業風</button>
            <button class="style-btn" data-style="minimal">現代極簡</button>
          </div>
        </div>

        <div class="panel-section">
          <h4><span class="panel-icon">📐</span>格局範本</h4>
          <div class="layout-buttons">
            <button class="layout-btn active" data-layout="classic">經典靠牆</button>
            <button class="layout-btn" data-layout="diagonal">對角配置</button>
            <button class="layout-btn" data-layout="center_open">中央開放</button>
            <button class="layout-btn" data-layout="reading_nook">閱讀角落</button>
            <button class="layout-btn" data-layout="face_window">面窗式</button>
            <button class="layout-btn" data-layout="minimal_void">極簡留白</button>
          </div>
        </div>

        <div class="panel-section">
          <h4><span class="panel-icon">🖌️</span>自訂牆面顏色</h4>
          <div class="color-row">
            <button class="color-swatch" style="background:#f4f1ec" data-color="#f4f1ec" title="米白"></button>
            <button class="color-swatch" style="background:#e8d5b7" data-color="#e8d5b7" title="奶茶"></button>
            <button class="color-swatch" style="background:#a8c8b8" data-color="#a8c8b8" title="鼠尾草綠"></button>
            <button class="color-swatch" style="background:#7a8aa0" data-color="#7a8aa0" title="霧霾藍"></button>
            <button class="color-swatch" style="background:#d4a5a5" data-color="#d4a5a5" title="蜜桃粉"></button>
            <button class="color-swatch" style="background:#3a3a3a" data-color="#3a3a3a" title="深炭灰"></button>
            <input type="color" id="customColor" value="#f4f1ec" class="color-picker" title="自訂顏色" />
          </div>
        </div>

        <div class="panel-section">
          <h4><span class="panel-icon">🪑</span>家具配置</h4>
          <div class="furniture-toggles">
            <label><input type="checkbox" checked data-furn="sofa" /><span>沙發</span></label>
            <label><input type="checkbox" checked data-furn="table" /><span>茶几</span></label>
            <label><input type="checkbox" checked data-furn="lamp" /><span>立燈</span></label>
            <label><input type="checkbox" checked data-furn="plant" /><span>植栽</span></label>
            <label><input type="checkbox" checked data-furn="rug" /><span>地毯</span></label>
            <label><input type="checkbox" checked data-furn="painting" /><span>掛畫</span></label>
            <label><input type="checkbox" checked data-furn="armchair" /><span>扶手椅</span></label>
            <label><input type="checkbox" checked data-furn="tvStand" /><span>電視櫃</span></label>
            <label><input type="checkbox" checked data-furn="sideTable" /><span>邊几</span></label>
          </div>
        </div>

        <div class="panel-section">
          <h4><span class="panel-icon">🎙️</span>AI 語音指令</h4>
          <button class="voice-btn" id="voiceBtn">
            <span class="mic-icon">🎤</span>
            <span class="voice-label">點擊說話，試試「換成工業風」</span>
          </button>
          <p class="voice-status" id="voiceStatus">支援關鍵字：北歐 / 日式 / 工業 / 極簡</p>
        </div>

        <div class="panel-section">
          <h4><span class="panel-icon">✨</span>AI 自動生成 / 重置</h4>
          <div class="action-row">
            <button class="generate-btn" id="generateBtn">
              <span>🎲</span> 隨機生成
            </button>
            <button class="reset-btn" id="resetBtn">
              <span>↺</span> 重置位置
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Three.js + 互動體驗主程式 -->
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="demo.js"></script>

<!-- PWA：註冊 Service Worker（離線快取、可安裝到主畫面）-->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => { /* SW 註冊失敗時靜默失敗，不影響網頁 */ });
    });
  }
</script>
</body>
</html>
